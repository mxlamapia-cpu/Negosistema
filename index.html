<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negosistema - Mapas Interactivos</title>
    <!-- Bootstrap 5 CSS para el diseño responsivo -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <!-- Leaflet CSS para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        /* Estilos base con la paleta oscura de Negosistema */
        body {
            background-color: #11141a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-custom {
            background-color: #1a1f29;
            border-bottom: 2px solid #0056b3;
        }
        .sidebar {
            background-color: #1a1f29;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #2d3545;
            height: calc(100vh - 100px);
        }
        /* Contenedor del mapa que antes era el recuadro blanco */
        .map-container {
            background-color: #1a1f29;
            border-radius: 8px;
            border: 1px solid #2d3545;
            overflow: hidden;
            height: calc(100vh - 100px);
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        /* Ajuste de colores para los popups de Leaflet para que combinen con la web */
        .leaflet-popup-content-wrapper {
            background: #1a1f29;
            color: #ffffff;
            border: 1px solid #0056b3;
        }
        .leaflet-popup-tip {
            background: #1a1f29;
        }
        .btn-negosistema {
            background-color: #0056b3;
            color: white;
            border: none;
        }
        .btn-negosistema:hover {
            background-color: #004085;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Barra de Navegación Superior -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom py-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">🌐 NEGOSISTEMA</a>
            <span class="navbar-text text-muted d-none d-sm-inline">
                Mapeo de Unidades Económicas - Iztapalapa
            </span>
        </div>
    </nav>

    <!-- Contenedor Principal del Tablero -->
    <div class="container-fluid mt-3">
        <div class="row g-3">
            <!-- Barra Lateral de Información (Izquierda) -->
            <div class="col-md-3">
                <div class="sidebar d-flex flex-column justify-content-between">
                    <div>
                        <h4 class="fw-bold text-info">Panel de Control</h4>
                        <p class="text-muted small">Selecciona una zona en el mapa para ver la distribución de negocios y productos.</p>
                        <hr class="border-secondary">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">ALCALDÍA</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" value="IZTAPALAPA" readonly>
                        </div>
                    </div>
                    <div class="text-center">
                        <small class="text-muted">Negosistema © 2026</small>
                    </div>
                </div>
            </div>

            <!-- Contenedor del Mapa (Derecha) -->
            <div class="col-md-9">
                <div class="map-container">
                    <!-- Aquí se inyecta el mapa interactivo de Leaflet -->
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts de Dependencias Externas -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://unpkg.com"></script>
    
    <!-- ARCHIVO CENTRALIZADO: Aquí se controla la lógica para no repetir código -->
    <script src="mapa.js"></script>
</body>
</html>
