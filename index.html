<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Negosistema - Directorio Hiperlocal de Iztapalapa</title>
    
    <!-- 1. Estilos Base Centralizados de tu Proyecto -->
    <link rel="stylesheet" href="./css/styles.css">
    
    <!-- 2. AQUÍ PEGA TU ENLACE STYLE DEL HOJA DE ESTILOS (CSS) DE LEAFLET -->
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        /* --- Estilos Críticos de Integración para el Mapa del Index --- */
        .contenedor-mapa-index {
            width: 100%;
            height: 100vh;
            position: relative;
            background-color: #e5e3df;
            overflow: hidden;
        }

        #mapa_general {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- Estilos de las Tarjetas de Presentación dentro del Mapa (Popups) --- */
        .popup-comercio {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-width: 240px;
            max-width: 280px;
        }

        .popup-comercio h3 {
            margin: 0 0 6px 0;
            color: #1a252f;
            font-size: 15px;
            font-weight: 700;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 4px;
        }

        .popup-comercio p {
            margin: 6px 0;
            color: #555;
            font-size: 13px;
            line-height: 1.4;
        }

        /* --- Contenedor Responsivo para Videos en Tarjetas Nivel 5 --- */
        .popup-video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 6px;
            margin-top: 8px;
        }

        .popup-video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <!-- 1. Contenedor Maestro para la Visualización en Pantalla Completa -->
    <div class="contenedor-mapa-index">
        <!-- El motor-mapas.js buscará este ID exacto para inyectar Leaflet -->
        <div id="mapa_general"></div>
    </div>

    <!-- 2. Enlace al Script de tu Motor de Mapas Local (Con guion medio) -->
    <script src="./js/motor-mapas.js"></script>

</body>
</html>
