<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Hiperlocal Iztapalapa</title>
    <!-- Estilos de Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
        #map { width: 100%; height: 100vh; }
        /* Estilo elegante para la tarjeta del negocio */
        .popup-negocio { font-size: 14px; line-height: 1.5; min-width: 200px; }
        .popup-title { font-size: 16px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .btn-whatsapp { 
            display: inline-block; background-color: #25D366; color: white !important; 
            padding: 8px 12px; border-radius: 5px; text-decoration: none; 
            font-weight: bold; margin-top: 8px; text-align: center; width: 85%;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Scripts de Leaflet y lectores de KML -->
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        // 1. Inicializar el mapa centrado en Iztapalapa
        const map = L.map('map').setView([19.3601, -99.0712], 14);

        // 2. Capa de mapa fluida (OpenStreetMap versión limpia)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap colaboradores'
        }).addTo(map);

        // 3. Descargar y procesar el archivo KML de My Maps
        fetch('negocios.kml')
            .then(response => {
                if (!response.ok) throw new Error("No se encontró el archivo negocios.kml en la carpeta");
                return response.text();
            })
            .then(str => {
                // Convertir el KML de Google a un formato que Leaflet entienda (GeoJSON)
                const parser = new DOMParser();
                const kml = parser.parseFromString(str, "text/xml");
                const geojson = toGeoJSON.kml(kml);

                // 4. Dibujar los pines y extraer la información oculta
                L.geoJSON(geojson, {
                    onEachFeature: function (feature, layer) {
                        const props = feature.properties;
                        
                        // Extraer el nombre del negocio
                        let nombre = props.name || "Negocio sin nombre";
                        let descripcionOriginal = props.description || "";
                        
                        // --- TRUCO TECNICO: Buscar datos ocultos de WhatsApp o Teléfono ---
                        let telefono = "";
                        // Si Google metió los datos en tablas estructuradas, los buscamos aquí:
                        if (props.ExtendedData) {
                            // Tu IA te ayuda a limpiar el texto si vienen datos extra
                            console.log("Datos encontrados para: " + nombre, props.ExtendedData);
                        }

                        // Intentar extraer un número de teléfono si existe en la descripción
                        const phoneMatch = descripcionOriginal.match(/\d{10}/);
                        if (phoneMatch) telefono = phoneMatch[0];

                        // 5. Diseñar la tarjeta de información (Popup)
                        let contenidoPopup = `
                            <div class="popup-negocio">
                                <div class="popup-title">🏬 ${nombre}</div>
                                <p>${descripcionOriginal || 'Sin descripción disponible.'}</p>
                        `;

                        // Si encontramos un teléfono, le añadimos el botón automático de WhatsApp
                        if (telefono) {
                            contenidoPopup += `<a href="https://wa.me{telefono}" target="_blank" class="btn-whatsapp">💬 Pedir por WhatsApp</a>`;
                        } else {
                            // Botón genérico por si no detecta el número automáticamente en el texto
                            contenidoPopup += `<a href="https://wa.me" target="_blank" class="btn-whatsapp">💬 Contactar</a>`;
                        }

                        contenidoPopup += `</div>`;
                        layer.bindPopup(contenidoPopup);
                    }
                }).addTo(map);
            })
            .catch(err => {
                console.error(err);
                alert("Error al cargar el mapa: Asegúrate de que el archivo se llame 'negocios.kml' y esté en la misma carpeta que este HTML.");
            });
    </script>
</body>
</html>
